name: CI/CD Pipeline

on:
  push:
    branches:
      - staging
      - main
  pull_request:
    branches:
      - staging
      - main

jobs:
  enforce-workflow:
    name: Enforce Staging to Main Workflow
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.base_ref == 'main'
    steps:
      - name: Check source branch
        run: |
          if [[ "${{ github.head_ref }}" != "staging" ]]; then
            echo "ERROR: All pull requests to 'main' MUST come from 'staging'."
            echo "Current source branch is '${{ github.head_ref }}'."
            echo "Vui lòng merge nhánh của bạn vào 'staging', sau khi staging pass CI/CD mới tạo PR từ 'staging' vào 'main'."
            exit 1
          fi

  test:
    name: Run Unit and Data Quality Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pytest pandas pandera great_expectations

      - name: Run Tests
        run: |
          pytest tests/ -v
